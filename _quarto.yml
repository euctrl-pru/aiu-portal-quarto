format:
  html:
    theme:
      light:
      - cosmo
      - assets/styles/theme.scss
      dark:
      - cosmo
      - assets/styles/theme-dark.scss
    mainfont: Exo
    toc: false
    css:
    - aiu-theme/css/custom.css
    include-after-body: aiu-theme/templates/footer.html
    include-in-header:
      text: |
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    resources:
    - aiu-theme/assets/**
